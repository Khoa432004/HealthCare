version: '3.8'

# ============================================================
# Stack đầy đủ cho production:
#   - app: Spring Boot (cổng 8080)
#   - db:  PostgreSQL 15 (cổng 5432)
#   - redis: Redis 7 (cổng 6379)
#
# Cách chạy:
#   1. Sao chép .env.example thành .env rồi điền giá trị thật
#   2. docker compose -f docker-compose.prod.yml up --build -d
# ============================================================

services:

  # ----------------------------------------------------------
  # Spring Boot Application
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthcare-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Database
      - SPRING_DATASOURCE_URL=${DATABASE_URL:-jdbc:postgresql://db:5432/healthcare_db}
      - SPRING_DATASOURCE_USERNAME=${DATABASE_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      # JPA
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      - SPRING_JPA_SHOW_SQL=false
      # Redis
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-redis}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_CACHE_TYPE=${SPRING_CACHE_TYPE:-redis}
      # JWT
      - SECURITY_JWT_SECRET=${JWT_SECRET}
      - SECURITY_JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
      - SECURITY_JWT_REFRESH_EXPIRATION_MS=${JWT_REFRESH_EXPIRATION_MS:-604800000}
      # Email (Gmail SMTP)
      - SPRING_MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - SPRING_MAIL_PORT=${MAIL_PORT:-587}
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      # Server / Profile
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ----------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: healthcare-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-healthcare_db}
      - POSTGRES_USER=${DATABASE_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Bỏ comment dòng dưới nếu muốn khởi tạo DB từ file SQL dump
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres} -d ${POSTGRES_DB:-healthcare_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis Cache
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: healthcare-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  healthcare-network:
    driver: bridge
